<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body data-bs-theme="light" id="body">
  <div class="app">

    <nav class="nav">
      <div class="nav-top-row">
        <div class="wordmark">Dino<em>cyclopedia</em></div>
        <button type="button" id="modeBtn" onclick="switchTheme()">Dark Mode</button>
      </div>
      <div class="nav-right">
        <span class="count" id="count"></span>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search…" autocomplete="off">
          <button onclick="doSearch()">GO</button>
        </div>
      </div>
    </nav>

    <div class="filter-row" id="filter-row" style="display:none">
      <span class="filter-label">DIET</span>
      <button class="filter-btn active" onclick="setDiet(this,'')">All</button>
      <button class="filter-btn" onclick="setDiet(this,'herbivore')">Herbivore</button>
      <button class="filter-btn" onclick="setDiet(this,'carnivore')">Carnivore</button>
      <button class="filter-btn" onclick="setDiet(this,'omnivore')">Omnivore</button>
    </div>

    <div id="state" class="state">
      <div class="pulse"><i class="ti ti-mood-smile"></i></div>
      <p class="state-title">Loading Dinocyclopedia…</p>
      <p class="state-sub" id="state-sub">Waking up the server — this may take 15–60 seconds on first load.</p>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="empty" style="display:none">
      <i class="ti ti-mood-sad"></i>
      <span>No specimens match your search.</span>
    </div>

    <div id="grid" class="grid" style="display:none"></div>

    <div id="load-more-wrap" class="load-more-wrap" style="display:none">
      <button class="load-more" onclick="showMore()">Load more</button>
    </div>

  </div>

  <div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
  <div class="panel" id="panel" role="dialog" aria-modal="true">
    <div class="panel-header">
      <span class="panel-counter" id="panel-counter"></span>
      <div class="panel-nav-btns">
        <button class="panel-nav-btn" id="btn-prev" onclick="navigatePanel(-1)">
          <i class="ti ti-arrow-left"></i> <span class="btn-label">Prev</span>
        </button>
        <button class="panel-nav-btn" id="btn-next" onclick="navigatePanel(1)">
          <span class="btn-label">Next</span> <i class="ti ti-arrow-right"></i>
        </button>
      </div>
      <button class="panel-close" onclick="closePanel()" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
    <img id="lightbox-img" src="" alt="">
    <span class="lightbox-caption" id="lightbox-caption"></span>
  </div>

  <script>
    const BASE = 'https://restasaurus.onrender.com/api/v1';
    const PAGE_SIZE = 40;

    let allDinos = [];
    let filtered = [];
    let displayed = 0;
    let dietFilter = '';
    let currentPanelIdx = -1;

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function safeStr(v) {
      if (v === null || v === undefined) return '';
      if (typeof v === 'object') return '';
      return String(v);
    }

    function getImageUrl(d) {
      if (d.image && typeof d.image === 'object' && d.image.imageURL) return d.image.imageURL;
      if (typeof d.image === 'string' && d.image.startsWith('http')) return d.image;
      return '';
    }

    function dietCode(diet) {
      const l = safeStr(diet).toLowerCase();
      if (l.includes('carnivore') || l.includes('carnivorous')) return 'C';
      if (l.includes('herbivore') || l.includes('herbivorous')) return 'H';
      if (l.includes('omnivore') || l.includes('omnivorous')) return 'O';
      return '';
    }

    function truncatePeriod(s, max = 28) {
      const str = safeStr(s);
      return str.length > max ? str.slice(0, max - 1) + '…' : str;
    }

    function buildAttrib(d) {
      let a = '';
      if (d.image && typeof d.image === 'object') {
        const img = d.image;
        if (img.author) a += `Image: ${esc(img.author)}`;
        if (img.license) a += ` · ${esc(img.license)}`;
        if (img.imageURL) a += `. `;
      }
      if (d.source) {
        const src = typeof d.source === 'object' ? d.source : null;
        const url = src ? (src.url || src.wikipediaURL || src.sourceURL) : (typeof d.source === 'string' ? d.source : '');
        if (url) a += `<a href="${esc(url)}" target="_blank" rel="noopener">Wikipedia source</a>`;
      }
      return a;
    }

    async function fetchWithRetry(url, retries = 5, delay = 6000) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const r = await fetch(url);
          if (r.ok) return r;
          if (attempt < retries) { setStateSub(`Server waking up… retry ${attempt}/${retries}`); await sleep(delay); }
          else throw new Error(`HTTP ${r.status}`);
        } catch (err) {
          if (attempt === retries) throw err;
          setStateSub(`Connection error, retrying ${attempt}/${retries}…`);
          await sleep(delay);
        }
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setStateSub(txt) { document.getElementById('state-sub').textContent = txt; }

    async function fetchAllPages() {
      let page = 1, all = [], totalPages = null, totalDinos = null;
      const bar = document.getElementById('progress-bar');
      while (true) {
        const r = await fetchWithRetry(`${BASE}/dinosaurs?page=${page}`);
        const data = await r.json();
        if (totalPages === null) {
          totalPages = data.totalPages || null;
          const cand = data.totalDinosaurs || data.total || null;
          totalDinos = (cand && cand > 50) ? cand : null;
        }
        const items = data.dinosaurs || data.data || data.results || [];
        if (!items.length) break;
        all = all.concat(items);
        if (totalPages) bar.style.width = Math.round((page / totalPages) * 100) + '%';
        setStateSub(`Loaded ${all.length}${totalDinos ? ' of ' + totalDinos : ''} specimens…`);
        if (totalPages && page >= totalPages) break;
        if (!totalPages && items.length < 50) break;
        page++;
      }
      bar.style.width = '100%';
      return all;
    }

    async function init() {
      try {
        const dinos = await fetchAllPages();
        allDinos = dinos.sort((a, b) => safeStr(a.name).localeCompare(safeStr(b.name)));
        document.getElementById('state').style.display = 'none';
        document.getElementById('filter-row').style.display = 'flex';
        filtered = allDinos;
        displayed = 0;
        renderGrid(true);
      } catch (err) {
        document.getElementById('state').innerHTML =
          `<p class="state-title">Failed to load</p>
         <p class="state-sub">${esc(err.message)}<br><br>The server may still be waking up — wait 30 s and refresh.</p>
         <button class="load-more" onclick="init()" style="margin-top:12px">Retry</button>`;
      }
    }

    function renderGrid(reset) {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const lmw = document.getElementById('load-more-wrap');
      const countEl = document.getElementById('count');

      if (!filtered.length) {
        grid.style.display = 'none';
        empty.style.display = 'flex';
        lmw.style.display = 'none';
        countEl.textContent = '0 results';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = '';

      if (reset) { grid.innerHTML = ''; displayed = 0; currentPanelIdx = -1; }

      const slice = filtered.slice(displayed, displayed + PAGE_SIZE);
      const frag = document.createDocumentFragment();

      slice.forEach((d, i) => {
        const gi = allDinos.indexOf(d);
        const absI = filtered.indexOf(d);
        const dc = dietCode(d.diet);
        const temporal = safeStr(d.temporalRange);
        const loco = safeStr(d.locomotionType);
        const imgUrl = getImageUrl(d);

        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
      <div class="card" id="card-${gi}" style="animation-delay:${Math.min(i * 18, 400)}ms">
        <div class="card-img" onclick="handleCardImgClick(event,${absI})">
          ${imgUrl
            ? `<img src="${esc(imgUrl)}" alt="${esc(d.name)}" loading="lazy"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="fallback-icon" ${imgUrl ? 'style="display:none"' : ''}>
            <i class="ti ti-file-unknown"></i>
          </div>
          ${imgUrl ? `<button class="img-expand-btn" title="View full image"><i class="ti ti-arrows-maximize"></i></button>` : ''}
          <span class="card-num">${String(absI + 1).padStart(3, '0')}</span>
          ${dc ? `<span class="diet-badge diet-${dc}">${dc === 'C' ? 'Carn' : dc === 'H' ? 'Herb' : 'Omni'}</span>` : ''}
        </div>
        <div class="card-body" onclick="toggleCardDesc(event,${gi})">
          <div class="card-name">${esc(d.name || 'Unknown')}</div>
          ${d.description ? `<div class="card-desc" id="desc-${gi}">${esc(d.description)}</div>` : ''}
          <div class="card-pills">
            ${temporal ? `<span class="pill" title="${esc(temporal)}">${esc(truncatePeriod(temporal))}</span>` : ''}
            ${loco ? `<span class="pill">${esc(loco)}</span>` : ''}
            ${d.diet ? `<span class="pill">${esc(d.diet)}</span>` : ''}
          </div>
          <div class="card-hint"><i class="ti ti-arrows-maximize"></i> Tap for details</div>
        </div>
      </div>`;
        frag.appendChild(wrapper);
      });

      grid.appendChild(frag);
      displayed += slice.length;

      countEl.textContent = filtered.length + ' specimen' + (filtered.length !== 1 ? 's' : '');
      lmw.style.display = displayed < filtered.length ? '' : 'none';
    }

    function handleCardImgClick(e, absI) {
      e.stopPropagation();
      const d = filtered[absI];
      if (!d) return;
      const imgUrl = getImageUrl(d);
      if (imgUrl) {
        openLightbox(imgUrl, safeStr(d.name));
      } else {
        openPanel(absI);
      }
    }

    function toggleCardDesc(e, gi) {
      e.stopPropagation();
      const descEl = document.getElementById(`desc-${gi}`);
      if (descEl) {
        descEl.classList.toggle('visible');
      }
      const d = allDinos[gi];
      if (!d) return;
      const absI = filtered.indexOf(d);
      if (absI === -1) return;
      openPanel(absI);
    }

    function openLightbox(url, name) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox-img').alt = name;
      document.getElementById('lightbox-caption').textContent = name;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function openPanel(fi) {
      currentPanelIdx = fi;
      renderPanel(fi);
      document.getElementById('backdrop').style.display = 'block';
      requestAnimationFrame(() => document.getElementById('panel').classList.add('open'));
      document.body.style.overflow = 'hidden';
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      const d = filtered[fi];
      if (d) {
        const gi = allDinos.indexOf(d);
        const card = document.getElementById(`card-${gi}`);
        if (card) card.classList.add('active-card');
      }
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('open');
      setTimeout(() => { document.getElementById('backdrop').style.display = 'none'; }, 280);
      document.body.style.overflow = '';
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      currentPanelIdx = -1;
    }

    function renderPanel(fi) {
      const d = filtered[fi];
      if (!d) return;
      const imgUrl = getImageUrl(d);
      const dc = dietCode(d.diet);
      const attrib = buildAttrib(d);
      const dietClass = dc ? ` panel-pill-${dc}` : '';

      document.getElementById('panel-counter').textContent =
        String(fi + 1).padStart(3, '0') + ' / ' + String(filtered.length).padStart(3, '0');
      document.getElementById('btn-prev').disabled = fi <= 0;
      document.getElementById('btn-next').disabled = fi >= filtered.length - 1;

      document.getElementById('panel-body').innerHTML = `
      ${imgUrl
          ? `<img class="panel-hero" src="${esc(imgUrl)}" alt="${esc(d.name)}"
                style="cursor:zoom-in" onclick="openLightbox('${esc(imgUrl)}','${esc(safeStr(d.name))}')"
                onerror="this.outerHTML='<div class=panel-hero-fallback><i class=\\'ti ti-file-unknown\\'></i></div>'">`
          : `<div class="panel-hero-fallback"><i class="ti ti-file-unknown"></i></div>`}
      <div class="panel-content">
        <div class="panel-name">${esc(d.name || 'Unknown')}</div>
        <div class="panel-pills">
          ${d.diet ? `<span class="panel-pill${dietClass}">${esc(d.diet)}</span>` : ''}
          ${d.temporalRange ? `<span class="panel-pill">${esc(safeStr(d.temporalRange))}</span>` : ''}
          ${d.locomotionType ? `<span class="panel-pill">${esc(safeStr(d.locomotionType))}</span>` : ''}
          ${d.classificationInfo ? `<span class="panel-pill">${esc(safeStr(d.classificationInfo))}</span>` : ''}
        </div>
        <div class="panel-divider"></div>
        <div class="panel-desc">${esc(d.description || 'No description available.')}</div>
        ${attrib ? `<div class="panel-attrib">${attrib}</div>` : ''}
      </div>`;

      document.getElementById('panel-body').scrollTop = 0;
    }

    function navigatePanel(dir) {
      const next = currentPanelIdx + dir;
      if (next < 0 || next >= filtered.length) return;
      if (next >= displayed) renderGrid(false);
      currentPanelIdx = next;
      renderPanel(next);
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      const d = filtered[next];
      if (d) {
        const gi = allDinos.indexOf(d);
        const card = document.getElementById(`card-${gi}`);
        if (card) { card.classList.add('active-card'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      }
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('open')) {
        if (e.key === 'Escape') closeLightbox();
        return;
      }
      if (currentPanelIdx === -1) return;
      if (e.key === 'Escape') closePanel();
      if (e.key === 'ArrowLeft') navigatePanel(-1);
      if (e.key === 'ArrowRight') navigatePanel(1);
    });

    function showMore() { renderGrid(false); }

    let searchTimer;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 220);
    });
    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    function doSearch() {
      const q = safeStr(document.getElementById('search').value).trim().toLowerCase();
      applyFilters(q, dietFilter);
    }

    function setDiet(btn, diet) {
      dietFilter = diet;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      doSearch();
    }

    function applyFilters(q, diet) {
      filtered = allDinos.filter(d => {
        const matchQ = !q || [d.name, d.description, d.diet, d.temporalRange, d.locomotionType, d.classificationInfo]
          .some(v => safeStr(v).toLowerCase().includes(q));
        const matchD = !diet || safeStr(d.diet).toLowerCase().includes(diet);
        return matchQ && matchD;
      });
      if (currentPanelIdx !== -1) closePanel();
      renderGrid(true);
    }

    var mode = "light";
    function switchTheme() {
      const body = document.getElementById("body");
      const btn = document.getElementById("modeBtn");
      if (mode === "light") {
        mode = "dark";
        body.setAttribute("data-bs-theme", "dark");
        btn.textContent = "Light Mode";
      } else {
        mode = "light";
        body.setAttribute("data-bs-theme", "light");
        btn.textContent = "Dark Mode";
      }
    }

    init();
  </script>
</body>

</html>
