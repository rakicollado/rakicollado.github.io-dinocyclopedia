<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Mono', monospace;
      background: #fff;
      color: #111;
    }

    .app {
      position: relative;
      min-height: 100vh;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
      gap: 12px;
      flex-wrap: wrap;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      letter-spacing: -.02em;
      color: #111;
    }

    .wordmark em {
      font-style: italic
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .count {
      font-size: .68rem;
      color: #777;
      white-space: nowrap
    }

    .search-wrap {
      display: flex
    }

    .search-wrap input {
      border: 1px solid #ccc;
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 5px 10px;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      background: #fff;
      color: #111;
      outline: none;
      width: 170px;
    }

    .search-wrap button {
      border: 1px solid #111;
      border-radius: 0 4px 4px 0;
      padding: 5px 10px;
      background: #111;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .06em;
      cursor: pointer;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: .65rem;
      color: #777;
      letter-spacing: .04em;
      margin-right: 2px
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: .04em;
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 99px;
      background: transparent;
      cursor: pointer;
      color: #777;
      transition: all .15s;
    }

    .filter-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 12px;
      padding: 16px;
      align-items: start;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      animation: rise .3s ease forwards;
      opacity: 0;
      transform: translateY(8px);
      background: #fff;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
    }

    .card.active-card {
      border-color: #111;
      box-shadow: 0 0 0 2px #111;
      transform: none;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .card-img {
      height: 155px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .fallback-icon {
      font-size: 52px;
      color: #ccc
    }

    .card-num {
      position: absolute;
      top: 6px;
      left: 6px;
      background: #111;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: .58rem;
      padding: 2px 5px;
      border-radius: 2px;
      z-index: 1;
    }

    .diet-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-family: 'DM Mono', monospace;
      font-size: .55rem;
      padding: 2px 6px;
      border-radius: 99px;
      z-index: 1;
      border: 1px solid;
    }

    .diet-C {
      background: #fff;
      border-color: #000;
      color: #000
    }

    .diet-H {
      background: #000;
      border-color: #000;
      color: #fff
    }

    .diet-O {
      background: #888;
      border-color: #888;
      color: #fff
    }

    .card-body {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: .95rem;
      letter-spacing: -.02em;
      line-height: 1.2
    }

    .card-desc {
      font-size: .68rem;
      color: #888;
      line-height: 1.45;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 2px
    }

    .pill {
      font-size: .58rem;
      letter-spacing: .03em;
      color: #777;
      background: #f5f5f5;
      border-radius: 99px;
      padding: 2px 7px;
      border: 1px solid #eee;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-hint {
      font-size: .58rem;
      color: #ccc;
      letter-spacing: .04em;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .card-hint i { font-size: .7rem; }

    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
      text-align: center;
    }

    .state-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem
    }

    .state-sub {
      font-size: .72rem;
      color: #777;
      max-width: 320px;
      line-height: 1.6
    }

    .pulse {
      font-size: 2rem;
      animation: pulse 1.4s ease-in-out infinite
    }

    @keyframes pulse {
      0%, 100% { opacity: .4 }
      50% { opacity: 1 }
    }

    .progress-wrap {
      width: 200px;
      height: 3px;
      background: #eee;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #111;
      border-radius: 99px;
      width: 0%;
      transition: width .3s ease;
    }

    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 10px;
      color: #bbb;
      font-size: .75rem;
    }

    #empty i {
      font-size: 2.5rem
    }

    .load-more-wrap {
      text-align: center;
      padding: 20px
    }

    .load-more {
      border: 1px solid #111;
      border-radius: 4px;
      padding: 8px 22px;
      background: #fff;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .06em;
      cursor: pointer;
      transition: background .15s;
    }

    .load-more:hover {
      background: #111;
      color: #fff;
    }

    .panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: fadein .2s ease;
    }
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }

    .panel {
      position: fixed;
      top: 0; right: 0;
      width: min(560px, 100vw);
      height: 100vh;
      background: #fff;
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      box-shadow: -8px 0 48px rgba(0,0,0,.18);
    }
    .panel.open { transform: translateX(0); }

    .panel-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      gap: 8px;
    }
    .panel-counter {
      font-size: .62rem;
      color: #aaa;
      letter-spacing: .04em;
      min-width: 80px;
    }
    .panel-nav-btns {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .panel-nav-btn {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      letter-spacing: .05em;
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: all .12s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .panel-nav-btn:hover:not(:disabled) { background: #111; color: #fff; border-color: #111; }
    .panel-nav-btn:disabled { opacity: .28; cursor: default; }

    .panel-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: none;
      cursor: pointer;
      color: #777;
      font-size: 1rem;
      transition: all .12s;
      flex-shrink: 0;
    }
    .panel-close:hover { background: #111; color: #fff; border-color: #111; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .panel-hero {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background: #f5f5f5;
    }
    .panel-hero-fallback {
      width: 100%;
      height: 200px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d0d0d0;
      font-size: 72px;
    }
    .panel-content {
      padding: 24px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -.03em;
      line-height: 1.15;
    }
    .panel-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .panel-pill {
      font-size: .62rem;
      letter-spacing: .03em;
      color: #555;
      background: #f5f5f5;
      border-radius: 99px;
      padding: 3px 10px;
      border: 1px solid #e8e8e8;
    }
    .panel-pill-C { background: #111; color: #fff; border-color: #111; }
    .panel-pill-H { background: #fff; color: #111; border-color: #111; }
    .panel-pill-O { background: #888; color: #fff; border-color: #888; }
    .panel-divider { height: 1px; background: #f0f0f0; }
    .panel-desc {
      font-size: .8rem;
      color: #333;
      line-height: 1.82;
    }
    .panel-attrib {
      font-size: .6rem;
      color: #bbb;
      line-height: 1.6;
      padding-top: 8px;
      border-top: 1px solid #f5f5f5;
    }
    .panel-attrib a { color: #999; }

    @media (max-width: 480px) {
      .panel { width: 100vw; }
      .panel-hero { height: 200px; }
      .panel-name { font-size: 1.6rem; }
    }
  </style>
</head>

<body>
  <div class="app">

    <nav class="nav">
      <div class="wordmark">Dino<em>cyclopedia</em></div>
      <div class="nav-right">
        <span class="count" id="count"></span>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search…" autocomplete="off">
          <button onclick="doSearch()">GO</button>
        </div>
      </div>
    </nav>

    <div class="filter-row" id="filter-row" style="display:none">
      <span class="filter-label">DIET</span>
      <button class="filter-btn active" onclick="setDiet(this,'')">All</button>
      <button class="filter-btn" onclick="setDiet(this,'herbivore')">Herbivore</button>
      <button class="filter-btn" onclick="setDiet(this,'carnivore')">Carnivore</button>
      <button class="filter-btn" onclick="setDiet(this,'omnivore')">Omnivore</button>
    </div>

    <div id="state" class="state">
      <div class="pulse"><i class="ti ti-mood-smile" aria-hidden="true"></i></div>
      <p class="state-title">Loading Dinocyclopedia…</p>
      <p class="state-sub" id="state-sub">Waking up the server — this may take 15–60 s on first load.</p>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="empty" style="display:none">
      <i class="ti ti-mood-sad"></i>
      <span>No specimens match your search.</span>
    </div>

    <div id="grid" class="grid" style="display:none"></div>

    <div id="load-more-wrap" class="load-more-wrap" style="display:none">
      <button class="load-more" onclick="showMore()">Load more</button>
    </div>

  </div>

  <div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
  <div class="panel" id="panel" role="dialog" aria-modal="true">
    <div class="panel-header">
      <span class="panel-counter" id="panel-counter"></span>
      <div class="panel-nav-btns">
        <button class="panel-nav-btn" id="btn-prev" onclick="navigatePanel(-1)">
          <i class="ti ti-arrow-left"></i> Prev
        </button>
        <button class="panel-nav-btn" id="btn-next" onclick="navigatePanel(1)">
          Next <i class="ti ti-arrow-right"></i>
        </button>
      </div>
      <button class="panel-close" onclick="closePanel()" aria-label="Close">
        <i class="ti ti-x"></i>
      </button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <script>
    const BASE = 'https://restasaurus.onrender.com/api/v1';
    const PAGE_SIZE = 40;

    let allDinos = [];
    let filtered = [];
    let displayed = 0;
    let dietFilter = '';
    let currentPanelIdx = -1;

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getImageUrl(d) {
      if (d.image && typeof d.image === 'object' && d.image.imageURL) return d.image.imageURL;
      if (typeof d.image === 'string' && d.image.startsWith('http')) return d.image;
      return '';
    }

    function dietCode(diet) {
      const l = (diet || '').toLowerCase();
      if (l.includes('carnivore') || l.includes('carnivorous')) return 'C';
      if (l.includes('herbivore') || l.includes('herbivorous')) return 'H';
      if (l.includes('omnivore') || l.includes('omnivorous')) return 'O';
      return '';
    }

    function truncatePeriod(s, max = 28) {
      if (!s) return '';
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }

    function buildAttrib(d) {
      let a = '';
      if (d.image && typeof d.image === 'object') {
        const img = d.image;
        if (img.author) a += `Image: ${esc(img.author)}`;
        if (img.license) a += ` · ${esc(img.license)}`;
        if (img.imageURL) a += `. `;
      }
      if (d.source) {
        const src = typeof d.source === 'object' ? d.source : null;
        const url = src ? (src.url || src.wikipediaURL || src.sourceURL) : (typeof d.source === 'string' ? d.source : '');
        if (url) a += `<a href="${esc(url)}" target="_blank" rel="noopener">Wikipedia source</a>`;
      }
      return a;
    }

    async function fetchWithRetry(url, retries = 5, delay = 6000) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const r = await fetch(url);
          if (r.ok) return r;
          if (attempt < retries) {
            setStateSub(`Server waking up… retry ${attempt}/${retries}`);
            await sleep(delay);
          } else throw new Error(`HTTP ${r.status}`);
        } catch (err) {
          if (attempt === retries) throw err;
          setStateSub(`Connection error, retrying ${attempt}/${retries}…`);
          await sleep(delay);
        }
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setStateSub(txt) { document.getElementById('state-sub').textContent = txt; }

    async function fetchAllPages() {
      let page = 1, all = [], totalPages = null, totalDinos = null;
      const bar = document.getElementById('progress-bar');

      while (true) {
        const r = await fetchWithRetry(`${BASE}/dinosaurs?page=${page}`);
        const data = await r.json();

        if (totalPages === null) {
          totalPages = data.totalPages || null;
          const cand = data.totalDinosaurs || data.total || null;
          totalDinos = (cand && cand > 50) ? cand : null;
        }

        const items = data.dinosaurs || data.data || data.results || [];
        if (!items.length) break;

        all = all.concat(items);
        if (totalPages) bar.style.width = Math.round((page / totalPages) * 100) + '%';
        setStateSub(`Loaded ${all.length}${totalDinos ? ' of ' + totalDinos : ''} specimens…`);

        if (totalPages && page >= totalPages) break;
        if (!totalPages && items.length < 50) break;
        page++;
      }

      bar.style.width = '100%';
      return all;
    }

    async function init() {
      try {
        const dinos = await fetchAllPages();
        allDinos = dinos.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        document.getElementById('state').style.display = 'none';
        document.getElementById('filter-row').style.display = 'flex';
        filtered = allDinos;
        displayed = 0;
        renderGrid(true);
      } catch (err) {
        document.getElementById('state').innerHTML =
          `<p class="state-title">Failed to load</p>
         <p class="state-sub">${esc(err.message)}<br><br>The server may still be waking up — wait 30 s and refresh.</p>
         <button class="load-more" onclick="init()" style="margin-top:12px">Retry</button>`;
      }
    }

    function renderGrid(reset) {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const lmw = document.getElementById('load-more-wrap');
      const count = document.getElementById('count');

      if (!filtered.length) {
        grid.style.display = 'none';
        empty.style.display = 'flex';
        lmw.style.display = 'none';
        count.textContent = '0 results';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = '';

      if (reset) { grid.innerHTML = ''; displayed = 0; currentPanelIdx = -1; }

      const slice = filtered.slice(displayed, displayed + PAGE_SIZE);
      const frag = document.createDocumentFragment();

      slice.forEach((d, i) => {
        const gi = allDinos.indexOf(d);
        const absI = filtered.indexOf(d);
        const dc = dietCode(d.diet);
        const temporal = d.temporalRange || '';
        const loco = d.locomotionType || '';
        const imgUrl = getImageUrl(d);

        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
        <div class="card" id="card-${gi}" style="animation-delay:${Math.min(i * 20, 400)}ms" onclick="openPanel(${absI})">
          <div class="card-img">
            ${imgUrl
            ? `<img src="${esc(imgUrl)}" alt="${esc(d.name)}" loading="lazy"
                      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
            <div class="fallback-icon" ${imgUrl ? 'style="display:none"' : ''}>
              <i class="ti ti-file-unknown" aria-hidden="true"></i>
            </div>
            <span class="card-num">${String(absI + 1).padStart(3, '0')}</span>
            ${dc ? `<span class="diet-badge diet-${dc}">${dc === 'C' ? 'Carn' : dc === 'H' ? 'Herb' : 'Omni'}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-name">${esc(d.name || 'Unknown')}</div>
            ${d.description ? `<div class="card-desc">${esc(d.description)}</div>` : ''}
            <div class="card-pills">
              ${temporal ? `<span class="pill" title="${esc(temporal)}">${esc(truncatePeriod(temporal))}</span>` : ''}
              ${loco ? `<span class="pill">${esc(loco)}</span>` : ''}
              ${d.diet ? `<span class="pill">${esc(d.diet)}</span>` : ''}
            </div>
            <div class="card-hint"><i class="ti ti-arrow-right"></i> View details</div>
          </div>
        </div>`;
        frag.appendChild(wrapper);
      });

      grid.appendChild(frag);
      displayed += slice.length;

      count.textContent = filtered.length + ' specimen' + (filtered.length !== 1 ? 's' : '');
      lmw.style.display = displayed < filtered.length ? '' : 'none';
    }

    function openPanel(fi) {
      currentPanelIdx = fi;
      renderPanel(fi);
      document.getElementById('backdrop').style.display = 'block';
      requestAnimationFrame(() => document.getElementById('panel').classList.add('open'));
      document.body.style.overflow = 'hidden';
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      const d = filtered[fi];
      if (d) {
        const gi = allDinos.indexOf(d);
        const card = document.getElementById(`card-${gi}`);
        if (card) card.classList.add('active-card');
      }
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('open');
      setTimeout(() => { document.getElementById('backdrop').style.display = 'none'; }, 280);
      document.body.style.overflow = '';
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      currentPanelIdx = -1;
    }

    function renderPanel(fi) {
      const d = filtered[fi];
      if (!d) return;

      const imgUrl = getImageUrl(d);
      const dc = dietCode(d.diet);
      const attrib = buildAttrib(d);

      document.getElementById('panel-counter').textContent =
        String(fi + 1).padStart(3, '0') + ' / ' + String(filtered.length).padStart(3, '0');
      document.getElementById('btn-prev').disabled = fi <= 0;
      document.getElementById('btn-next').disabled = fi >= filtered.length - 1;

      const dietClass = dc ? ` panel-pill-${dc}` : '';

      document.getElementById('panel-body').innerHTML = `
        ${imgUrl
          ? `<img class="panel-hero" src="${esc(imgUrl)}" alt="${esc(d.name)}"
                  onerror="this.outerHTML='<div class=panel-hero-fallback><i class=\\'ti ti-file-unknown\\'></i></div>'">`
          : `<div class="panel-hero-fallback"><i class="ti ti-file-unknown"></i></div>`}
        <div class="panel-content">
          <div class="panel-name">${esc(d.name || 'Unknown')}</div>
          <div class="panel-pills">
            ${d.diet          ? `<span class="panel-pill${dietClass}">${esc(d.diet)}</span>` : ''}
            ${d.temporalRange ? `<span class="panel-pill">${esc(d.temporalRange)}</span>` : ''}
            ${d.locomotionType? `<span class="panel-pill">${esc(d.locomotionType)}</span>` : ''}
            ${d.classificationInfo ? `<span class="panel-pill">${esc(d.classificationInfo)}</span>` : ''}
          </div>
          <div class="panel-divider"></div>
          <div class="panel-desc">${esc(d.description || 'No description available.')}</div>
          ${attrib ? `<div class="panel-attrib">${attrib}</div>` : ''}
        </div>`;

      document.getElementById('panel-body').scrollTop = 0;
    }

    function navigatePanel(dir) {
      const next = currentPanelIdx + dir;
      if (next < 0 || next >= filtered.length) return;
      // ensure the card is rendered so we can highlight it
      if (next >= displayed) renderGrid(false);
      currentPanelIdx = next;
      renderPanel(next);
      // update active-card highlight
      document.querySelectorAll('.card.active-card').forEach(c => c.classList.remove('active-card'));
      const d = filtered[next];
      if (d) {
        const gi = allDinos.indexOf(d);
        const card = document.getElementById(`card-${gi}`);
        if (card) { card.classList.add('active-card'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      }
    }

    document.addEventListener('keydown', e => {
      if (currentPanelIdx === -1) return;
      if (e.key === 'Escape')      closePanel();
      if (e.key === 'ArrowLeft')   navigatePanel(-1);
      if (e.key === 'ArrowRight')  navigatePanel(1);
    });

    function showMore() { renderGrid(false); }

    let searchTimer;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 200);
    });
    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    function doSearch() {
      applyFilters(document.getElementById('search').value.trim().toLowerCase(), dietFilter);
    }

    function setDiet(btn, diet) {
      dietFilter = diet;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      doSearch();
    }

    function applyFilters(q, diet) {
      filtered = allDinos.filter(d => {
        const matchQ = !q || [d.name, d.description, d.diet, d.temporalRange, d.locomotionType, d.classificationInfo]
          .some(v => v && v.toLowerCase().includes(q));
        const matchD = !diet || (d.diet || '').toLowerCase().includes(diet);
        return matchQ && matchD;
      });
      if (currentPanelIdx !== -1) closePanel();
      renderGrid(true);
    }

    init();
  </script>
</body>

</html>
