<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
  .font-display {
    font-family: 'DM Serif Display', Georgia, serif;
  }

  .font-mono {
    font-family: 'DM Mono', monospace;
  }

  .navbar {
    border-bottom: 1px solid #000;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    letter-spacing: -0.02em;
  }

  .wordmark em {
    font-style: italic;
  }

  #search {
    border: 1px solid #000;
    border-right: none;
    border-radius: 4px 0 0 4px;
  }

  #search:focus {
    box-shadow: none;
    border-color: #000;
  }

  .btn-search {
    border-radius: 0 4px 4px 0;
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: .06em;
  }

  #state .state-icon {
    font-size: 3rem;
    animation: pulse 1.6s ease-in-out infinite;
  }

  #state.error .state-icon {
    animation: none;
  }

  @keyframes pulse {

    0%,
    100% {
      opacity: 1
    }

    50% {
      opacity: .25
    }
  }

  .dino-card {
    border: 1px solid #000 !important;
    border-radius: 6px;
    overflow: hidden;
    animation: rise .35s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  @keyframes rise {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .dino-card .card-img-top {
    filter: grayscale(100%);
    object-fit: cover;
    height: 190px;
    transition: transform .4s ease;
    border-bottom: 1px solid #000;
  }

  .dino-card:hover .card-img-top {
    transform: scale(1.04);
  }

  .img-placeholder {
    height: 190px;
    background: #f5f5f5;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: #ccc;
    font-family: 'DM Mono', monospace;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    letter-spacing: -.02em;
  }

  .card-text {
    font-size: .82rem;
    color: #444;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .badge-tag {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .04em;
    font-weight: 400;
    border-radius: 99px;
    border: 1px solid #000;
    padding: .25rem .55rem;
  }

  .badge-carnivore {
    background: #000;
    color: #fff;
  }

  .badge-herbivore {
    background: #fff;
    color: #000;
  }

  .badge-period {
    background: #fff;
    color: #000;
  }
</style>

<body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span id="count" class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem; white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input id="search" type="text" class="form-control form-control-sm bg-white" placeholder="Search dinosaurs..."
          autocomplete="off" />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4 px-3 px-md-4" style="min-height:80vh;">

    <div id="state" class="d-flex flex-column align-items-center justify-content-center py-5 text-center"
      style="min-height:50vh;">
      <h2 class="font-display fs-3 mb-2">Loading Dinocyclopedia...</h2>
      <p class="text-muted" style="max-width:26rem; font-size:.9rem;">
        Fetching specimens from the Mesozoic archives.
      </p>
    </div>

    <div id="grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3" style="display:none;"></div>

    <div id="empty" class="text-center py-5" style="display:none;">
      <p class="font-display fs-2 text-secondary">No dinosaurs found.</p>
      <small class="text-muted">Try a different search term.</small>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    const API = 'https://dinosaur-facts-api.shultzlab.com/dinosaurs';
    let allDinos = [];

    const norm = (d) => ({
      name: d.name || 'Unknown',
      image: d.image || '',
      description: d.description || '',
      diet: (d.diet || 'unknown').toLowerCase(),
      period: d.period || '',
    });

    const esc = (s) =>
      String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const dietClass = (diet) =>
      diet.includes('carniv') ? 'badge-carnivore' : 'badge-herbivore';

    const renderCards = (dinos) => {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      if (!dinos.length) {
        grid.style.display = 'none';
        empty.style.display = '';
        count.textContent = '0 results';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = '';
      count.textContent = dinos.length + ' specimen' + (dinos.length !== 1 ? 's' : '');

      grid.innerHTML = dinos.map((raw, i) => {
        const d = norm(raw);
        const idx = String(i + 1).padStart(3, '0');
        const img = d.image
          ? `<img src="${esc(d.image)}" class="card-img-top" alt="${esc(d.name)}" loading="lazy" onerror="this.outerHTML='<div class=\'img-placeholder\'>?</div>'" />`
          : `<div class="img-placeholder">?</div>`;
        const dietBadge = d.diet !== 'unknown'
          ? `<span class="badge-tag ${dietClass(d.diet)}">${esc(d.diet)}</span>` : '';
        const periodBadge = d.period
          ? `<span class="badge-tag badge-period">${esc(d.period)}</span>` : '';

        return `
        <div class="col">
          <div class="card h-100 dino-card" style="animation-delay:${Math.min(i * 28, 600)}ms">
            <div class="overflow-hidden position-relative">
              ${img}
              <span class="badge bg-dark position-absolute top-0 start-0 m-2 rounded-1"
                style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.05em;font-weight:400">
                ${idx}
              </span>
            </div>
            <div class="card-body d-flex flex-column gap-2 p-3">
              <h5 class="card-title mb-0">${esc(d.name)}</h5>
              ${d.description ? `<p class="card-text mb-0">${esc(d.description)}</p>` : ''}
              <div class="d-flex flex-wrap gap-1 mt-auto pt-2 border-top border-dark">
                ${dietBadge}${periodBadge}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    };

    const fetchDinosaurs = async () => {
      const res = await fetch(API);
      const data = await res.json();
      const raw = Array.isArray(data) ? data : (data.dinosaurs || Object.values(data));

      allDinos = raw.sort((a, b) => norm(a).name.localeCompare(norm(b).name));

      document.getElementById('state').style.display = 'none';
      renderCards(allDinos);
    };

    fetchDinosaurs();

    document.getElementById('search').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  renderCards(
    q
      ? allDinos.filter((raw) => {
          const d = norm(raw);
          return [d.name, d.description, d.diet, d.period]
            .some((v) => v.toLowerCase().includes(q));
        })
      : allDinos
  );
});
  </script>

</body>

</html>
