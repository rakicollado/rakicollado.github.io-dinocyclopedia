<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
  .font-display {
    font-family: 'DM Serif Display', Georgia, serif;
  }

  .font-mono {
    font-family: 'DM Mono', monospace;
  }

  .navbar {
    border-bottom: 1px solid #000;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    letter-spacing: -0.02em;
  }

  .wordmark em {
    font-style: italic;
  }

  #search {
    border: 1px solid #000;
    border-right: none;
    border-radius: 4px 0 0 4px;
  }

  #search:focus {
    box-shadow: none;
    border-color: #000;
  }

  .btn-search {
    border-radius: 0 4px 4px 0;
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: .06em;
  }

  #state .state-icon {
    font-size: 3rem;
    animation: pulse 1.6s ease-in-out infinite;
  }

  #state.error .state-icon {
    animation: none;
  }

  @keyframes pulse {

    0%,
    100% {
      opacity: 1
    }

    50% {
      opacity: .25
    }
  }

  .dino-card {
    border: 1px solid #000 !important;
    border-radius: 6px;
    overflow: hidden;
    animation: rise .35s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  @keyframes rise {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .dino-card .card-img-top {
    filter: grayscale(100%);
    object-fit: cover;
    height: 190px;
    transition: transform .4s ease;
    border-bottom: 1px solid #000;
  }

  .dino-card:hover .card-img-top {
    transform: scale(1.04);
  }

  .img-placeholder {
    height: 190px;
    background: #f5f5f5;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: #ccc;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    letter-spacing: -.02em;
  }

  .card-text {
    font-size: .82rem;
    color: #444;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .badge-tag {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .04em;
    font-weight: 400;
    border-radius: 99px;
    border: 1px solid #000;
    padding: .25rem .55rem;
  }

  .badge-carnivore {
    background: #000;
    color: #fff;
  }

  .badge-herbivore {
    background: #fff;
    color: #000;
  }

  .badge-period {
    background: #fff;
    color: #000;
  }
</style>

<body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span id="count" class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem; white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input id="search" type="text" class="form-control form-control-sm bg-white" placeholder="Search dinosaurs..."
          autocomplete="off" />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4 px-3 px-md-4" style="min-height:80vh;">

    <div id="state" class="d-flex flex-column align-items-center justify-content-center py-5 text-center"
      style="min-height:50vh;">
      <h2 class="font-display fs-3 mb-2">Loading Dinocyclopedia...</h2>
      <p class="text-muted" style="max-width:26rem; font-size:.9rem;">
        Fetching specimens from the Mesozoic archives.
      </p>
    </div>

    <div id="grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3" style="display:none;"></div>

    <div id="empty" class="text-center py-5" style="display:none;">
      <p class="font-display fs-2 text-secondary">No dinosaurs found.</p>
      <small class="text-muted">Try a different search term.</small>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    const API = 'https://dinosaur-facts-api.shultzlab.com/dinosaurs';
    let allDinos = [];

    const norm = (d) => ({
      name: d.name || d.Name || 'Unknown',
      image: d.image || d.Image || d.imageUrl || d.img || '',
      description: d.description || d.Description || d.info || '',
      diet: (d.diet || d.Diet || 'unknown').toLowerCase(),
      period: d.period || d.Period || d.era || '',
    });

    const esc = (s) =>
      String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const fetchDinosaurs = async () => {
      const res = await fetch(API);
      const data = await res.json();
      const raw = Array.isArray(data) ? data : (data.dinosaurs || Object.values(data));

      allDinos = raw.sort((a, b) => norm(a).name.localeCompare(norm(b).name));

      console.log('✅ Normalized sample:', norm(allDinos[0]));
      console.log('📦 Total specimens:', allDinos.length);
    }

    fetchDinosaurs();
  </script>

</body>

</html>
