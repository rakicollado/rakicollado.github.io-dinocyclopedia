<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  .app {
    font-family: 'DM Mono', monospace;
    background: var(--color-background-primary);
    color: var(--color-text-primary)
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--color-text-primary);
    position: sticky;
    top: 0;
    background: var(--color-background-primary);
    z-index: 10;
    gap: 12px;
    flex-wrap: wrap
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -.02em;
    color: var(--color-text-primary);
    text-decoration: none
  }

  .wordmark em {
    font-style: italic
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: flex-end;
    flex-wrap: wrap
  }

  .count {
    font-size: .68rem;
    color: var(--color-text-secondary);
    white-space: nowrap
  }

  .search-wrap {
    display: flex
  }

  .search-wrap input {
    border: 1px solid var(--color-text-primary);
    border-right: none;
    border-radius: 4px 0 0 4px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    outline: none;
    width: 170px
  }

  .search-wrap button {
    border: 1px solid var(--color-text-primary);
    border-radius: 0 4px 4px 0;
    padding: 5px 10px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .06em;
    cursor: pointer
  }

  .filter-row {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--color-border-tertiary);
    flex-wrap: wrap;
    align-items: center
  }

  .filter-label {
    font-size: .65rem;
    color: var(--color-text-secondary);
    letter-spacing: .04em;
    margin-right: 2px
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: .62rem;
    letter-spacing: .04em;
    padding: 3px 10px;
    border: 1px solid var(--color-border-secondary);
    border-radius: 99px;
    background: transparent;
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: all .15s
  }

  .filter-btn.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary)
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 12px;
    padding: 16px
  }

  .card {
    border: 1px solid var(--color-text-primary);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s;
    animation: rise .3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    background: var(--color-background-primary)
  }

  .card:hover {
    transform: translateY(-2px)
  }

  @keyframes rise {
    to {
      opacity: 1;
      transform: translateY(0)
    }
  }

  .card-img {
    height: 155px;
    background: var(--color-background-secondary);
    border-bottom: 1px solid var(--color-text-primary);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block
  }

  .fallback-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%
  }

  .fallback-wrap svg {
    width: 65px;
    height: 65px;
    fill: #d0d0d0
  }

  .card-num {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Mono', monospace;
    font-size: .58rem;
    padding: 2px 5px;
    border-radius: 2px;
    z-index: 1
  }

  .diet-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-family: 'DM Mono', monospace;
    font-size: .55rem;
    padding: 2px 6px;
    border-radius: 99px;
    z-index: 1;
    border: 1px solid
  }

  .diet-C {
    background: #fff;
    border-color: #000;
    color: #000
  }

  .diet-H {
    background: #000;
    border-color: #000;
    color: #fff
  }

  .diet-O {
    background: #888;
    border-color: #888;
    color: #fff
  }

  .card-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: .95rem;
    letter-spacing: -.02em;
    line-height: 1.2
  }

  .card-desc {
    font-size: .7rem;
    color: var(--color-text-secondary);
    display: -webkit-box;
   line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 2px
  }

  .pill {
    font-size: .58rem;
    letter-spacing: .03em;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border-radius: 99px;
    padding: 2px 7px;
    border: 1px solid var(--color-border-tertiary)
  }

  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    gap: 12px;
    min-height: 300px
  }

  .state-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem
  }

  .state-sub {
    font-size: .8rem;
    color: var(--color-text-secondary);
    max-width: 24rem;
    line-height: 1.6
  }

  .pulse {
    animation: pulse 1.4s ease-in-out infinite;
    color: var(--color-text-secondary)
  }

  @keyframes pulse {

    0%,
    100% {
      opacity: 1
    }

    50% {
      opacity: .2
    }
  }

  .retry {
    border: 1px solid var(--color-text-primary);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 6px
  }

  .load-more-wrap {
    text-align: center;
    padding: 20px
  }

  .load-more {
    border: 1px solid var(--color-text-primary);
    background: transparent;
    color: var(--color-text-primary);
    padding: 8px 24px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: .05em
  }

  .load-more:hover {
    background: var(--color-text-primary);
    color: var(--color-background-primary)
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px
  }

  .modal {
    background: rgba(255, 255, 255, .94);
    border: 1px solid rgba(0, 0, 0, .8);
    border-radius: 14px;
    width: min(560px, 100%);
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    animation: mIn .18s ease
  }

  @media(prefers-color-scheme:dark) {
    .modal {
      background: rgba(18, 18, 18, .94);
      border-color: rgba(255, 255, 255, .25)
    }
  }

  @keyframes mIn {
    from {
      opacity: 0;
      transform: scale(.95) translateY(10px)
    }

    to {
      opacity: 1;
      transform: scale(1) translateY(0)
    }
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    border: 1px solid var(--color-border-secondary);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: .85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-primary);
    z-index: 2;
    line-height: 1
  }

  .modal-hero {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 13px 13px 0 0;
    background: var(--color-background-secondary);
    display: block
  }

  .modal-hero-fallback {
    width: 100%;
    height: 230px;
    border-radius: 13px 13px 0 0;
    background: var(--color-background-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--color-border-tertiary)
  }

  .modal-hero-fallback svg {
    width: 100px;
    height: 100px;
    fill: #ccc
  }

  .modal-body {
    padding: 18px 22px 22px
  }

  .modal-meta-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px
  }

  .modal-num {
    font-size: .65rem;
    letter-spacing: .06em;
    color: var(--color-text-secondary)
  }

  .modal-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    letter-spacing: -.03em;
    line-height: 1.15;
    margin-bottom: 10px
  }

  .modal-desc {
    font-size: .8rem;
    line-height: 1.75;
    color: var(--color-text-secondary);
    margin-bottom: 14px
  }

  .modal-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px
  }

  .modal-pill {
    font-size: .63rem;
    letter-spacing: .04em;
    border: 1px solid var(--color-text-primary);
    border-radius: 99px;
    padding: 3px 11px;
    background: transparent;
    color: var(--color-text-primary)
  }

  .modal-attrib {
    font-size: .6rem;
    color: var(--color-text-secondary);
    line-height: 1.6;
    padding-top: 10px;
    border-top: 1px solid var(--color-border-tertiary);
    margin-bottom: 16px
  }

  .modal-attrib a {
    color: var(--color-text-secondary)
  }

  .modal-nav {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    align-items: center
  }

  .modal-pos {
    font-size: .65rem;
    color: var(--color-text-secondary);
    letter-spacing: .04em
  }

  .nav-btns {
    display: flex;
    gap: 8px
  }

  .nav-btn {
    border: 1px solid var(--color-text-primary);
    background: transparent;
    color: var(--color-text-primary);
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .05em;
    cursor: pointer;
    border-radius: 4px;
    transition: background .12s, color .12s
  }

  .nav-btn:hover {
    background: var(--color-text-primary);
    color: var(--color-background-primary)
  }

  .nav-btn:disabled {
    opacity: .25;
    cursor: default
  }

  .empty {
    text-align: center;
    padding: 48px;
    color: var(--color-text-secondary);
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem
  }
</style>

<body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span id="count" class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem; white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input id="search" type="text" class="form-control form-control-sm bg-white" placeholder="Search dinosaurs..."
          autocomplete="off" />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4 px-3 px-md-4" style="min-height:80vh;">

    <div id="state" class="d-flex flex-column align-items-center justify-content-center py-5 text-center"
      style="min-height:50vh;">
      <div class="state-icon mb-3">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#ccc">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <h2 class="font-display fs-3 mb-2">Loading Dinocyclopedia...</h2>
      <p class="text-muted" style="max-width:26rem; font-size:.9rem;">
        Fetching specimens from the Mesozoic archives.
      </p>
    </div>

    <div id="grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3" style="display:none;"></div>

    <div id="empty" class="text-center py-5" style="display:none;">
      <p class="font-display fs-2 text-secondary">No dinosaurs found.</p>
      <small class="text-muted">Try a different search term.</small>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script>
    let allDinos = [];

    const DINO_SVG = `<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M70,55 C68,50 65,46 60,44 L58,30 C57,24 52,20 47,22 L40,24 C36,25 32,28 30,32 L25,40 C20,42 16,46 15,52 L14,58 C14,60 15,62 17,62 L22,62 L22,68 C22,70 24,72 26,72 L30,72 C32,72 34,70 34,68 L34,62 L55,62 L55,68 C55,70 57,72 59,72 L63,72 C65,72 67,70 67,68 L67,62 L72,62 C75,62 77,59 76,56 Z M50,28 C52,26 55,27 56,30 L57,38 L45,37 L46,30 C47,28 48,27 50,28 Z M80,38 C82,36 86,36 88,40 L90,48 C90,50 88,52 86,52 L76,50 L74,42 Z"/>
    </svg>`;

    const norm = (d) => ({
      name: d.name || 'Unknown',
      description: d.description || '',
      period: d.period || '',
      diet: d.diet || '',
      length: d.length || '',
    });

    const esc = (s) =>
      String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const renderCards = (dinos) => {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      if (!dinos.length) {
        grid.style.display = 'none';
        empty.style.display = '';
        count.textContent = '0 results';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = '';
      count.textContent = dinos.length + ' specimen' + (dinos.length !== 1 ? 's' : '');

      grid.innerHTML = dinos.map((raw, i) => {
        const d = norm(raw);
        const idx = String(i + 1).padStart(3, '0');

        return `
        <div class="col">
          <div class="card h-100 dino-card" style="animation-delay:${Math.min(i * 28, 600)}ms">
            <div class="overflow-hidden position-relative">
              <div class="img-placeholder">
                <div class="dino-silhouette">${DINO_SVG}</div>
              </div>
              <span class="badge bg-dark position-absolute top-0 start-0 m-2 rounded-1"
                style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.05em;font-weight:400">
                ${esc(idx)}
              </span>
            </div>
            <div class="card-body d-flex flex-column gap-2 p-3">
              <h5 class="card-title mb-0">${esc(d.name)}</h5>
              ${d.description ? `<p class="card-text mb-0">${esc(d.description)}</p>` : ''}
              <div class="d-flex flex-wrap gap-1 mt-auto pt-1">
                ${d.period ? `<span class="meta-pill">${esc(d.period)}</span>` : ''}
                ${d.diet ? `<span class="meta-pill">${esc(d.diet)}</span>` : ''}
                ${d.length ? `<span class="meta-pill">${esc(d.length)}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    };

    const fetchDinosaurs = async () => {
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            messages: [{
              role: 'user',
              content: `Generate a JSON array of 40 well-known dinosaurs. Return ONLY valid JSON, no markdown, no preamble.
              Each object must have these fields:
              - name (string): scientific name
              - description (string): 1-2 sentence factual description, 30-60 words
              - period (string): e.g. "Late Cretaceous" or "Early Jurassic"
              - diet (string): "Carnivore", "Herbivore", or "Omnivore"
              - length (string): approximate length, e.g. "12m" or "0.5m"

              Include a wide variety: large and small, predators and herbivores, from different periods.
              Return ONLY the JSON array, nothing else.`
            }]
          })
        });

        if (!res.ok) throw new Error(`API error: HTTP ${res.status}`);
        const data = await res.json();

        const text = data.content
          .filter(b => b.type === 'text')
          .map(b => b.text)
          .join('');

        const cleaned = text.replace(/```json|```/g, '').trim();
        const dinos = JSON.parse(cleaned);

        if (!Array.isArray(dinos)) throw new Error('Unexpected response format');

        allDinos = dinos.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

        document.getElementById('state').style.display = 'none';
        renderCards(allDinos);
      } catch (err) {
        const state = document.getElementById('state');
        state.classList.add('error');
        state.innerHTML = `
          <h2 class="font-display fs-3 mb-2">Failed to load</h2>
          <p class="text-muted" style="max-width:26rem; font-size:.9rem;">${esc(err.message)}</p>
          <button class="btn btn-dark btn-sm mt-2" onclick="location.reload()">Try again</button>
        `;
      }
    };

    fetchDinosaurs();

    document.getElementById('search').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      renderCards(
        q
          ? allDinos.filter((raw) => {
              const d = norm(raw);
              return [d.name, d.description, d.period, d.diet]
                .some((v) => v.toLowerCase().includes(q));
            })
          : allDinos
      );
    });
  </script>

</body>

</html>
