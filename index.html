<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <h1> Welcome to Dinocyclopedia</h1>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span  class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem;white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input  type="text" class="form-control form-control-sm bg-white" placeholder="Search dinosaurs..."
          autocomplete="off" />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4 px-3 px-md-4" style="min-height:80vh;">
    <div class="d-flex flex-column align-items-center justify-content-center py-5 text-center"
      style="min-height:50vh;">
      <h2 class="font-display fs-3 mb-2">Loading Dinocyclopedia...</h2>
      <p class="text-muted" style="max-width:26rem;font-size:.9rem;">Fetching specimens from the Mesozoic archives.</p>
    </div>
    <div  class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3" style="display:none;"></div>
    <div class="text-center py-5" style="display:none;">
      <p class="font-display fs-2 text-secondary">No dinosaurs found.</p>
      <small class="text-muted">Try a different search term.</small>
    </div>
  </main>

<script>

</script>
</html>
