<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
  .font-display {
  font-family: 'DM Serif Display', Georgia, serif;
}

.font-mono {
  font-family: 'DM Mono', monospace;
}

.navbar {
  border-bottom: 1px solid #000;
}

.wordmark {
  font-family: 'DM Serif Display', serif;
  font-size: 1.7rem;
  letter-spacing: -0.02em;
}

.wordmark em {
  font-style: italic;
}

#search {
  border: 1px solid #000;
  border-right: none;
  border-radius: 4px 0 0 4px;
}

#search:focus {
  box-shadow: none;
  border-color: #000;
}

.btn-search {
  border-radius: 0 4px 4px 0;
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  letter-spacing: .06em;
}
</style>

<body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span id="count" class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem; white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input
          id="search"
          type="text"
          class="form-control form-control-sm bg-white"
          placeholder="Search dinosaurs..."
          autocomplete="off"
        />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>

</body>
</html>
