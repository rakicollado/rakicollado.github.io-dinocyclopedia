<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  .app {
    font-family: 'DM Mono', monospace;
    background: var(--color-background-primary);
    color: var(--color-text-primary)
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--color-border-primary);
    position: sticky;
    top: 0;
    background: var(--color-background-primary);
    z-index: 10;
    gap: 12px;
    flex-wrap: wrap
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -.02em;
    color: var(--color-text-primary)
  }

  .wordmark em {
    font-style: italic
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: flex-end;
    flex-wrap: wrap
  }

  .count {
    font-size: .68rem;
    color: var(--color-text-secondary);
    white-space: nowrap
  }

  .search-wrap {
    display: flex
  }

  .search-wrap input {
    border: 1px solid var(--color-border-primary);
    border-right: none;
    border-radius: 4px 0 0 4px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    outline: none;
    width: 170px
  }

  .search-wrap button {
    border: 1px solid var(--color-border-primary);
    border-radius: 0 4px 4px 0;
    padding: 5px 10px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .06em;
    cursor: pointer
  }

  .filter-row {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--color-border-tertiary);
    flex-wrap: wrap;
    align-items: center
  }

  .filter-label {
    font-size: .65rem;
    color: var(--color-text-secondary);
    letter-spacing: .04em;
    margin-right: 2px
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: .62rem;
    letter-spacing: .04em;
    padding: 3px 10px;
    border: 1px solid var(--color-border-secondary);
    border-radius: 99px;
    background: transparent;
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: all .15s
  }

  .filter-btn.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary)
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 12px;
    padding: 16px
  }

  .card {
    border: 1px solid var(--color-border-primary);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s;
    animation: rise .3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    background: var(--color-background-primary)
  }

  .card:hover {
    transform: translateY(-2px)
  }

  @keyframes rise {
    to {
      opacity: 1;
      transform: translateY(0)
    }
  }

  .card-img {
    height: 155px;
    background: var(--color-background-secondary);
    border-bottom: 1px solid var(--color-border-primary);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block
  }

  .fallback-icon {
    font-size: 52px;
    color: var(--color-border-secondary)
  }

  .card-num {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Mono', monospace;
    font-size: .58rem;
    padding: 2px 5px;
    border-radius: 2px;
    z-index: 1
  }

  .diet-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-family: 'DM Mono', monospace;
    font-size: .55rem;
    padding: 2px 6px;
    border-radius: 99px;
    z-index: 1;
    border: 1px solid
  }

  .diet-C {
    background: #fff;
    border-color: #000;
    color: #000
  }

  .diet-H {
    background: #000;
    border-color: #000;
    color: #fff
  }

  .diet-O {
    background: #888;
    border-color: #888;
    color: #fff
  }

  .card-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: .95rem;
    letter-spacing: -.02em;
    line-height: 1.2
  }

  .card-desc {
    font-size: .7rem;
    color: var(--color-text-secondary);
    display: -webkit-box;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 2px
  }

  .pill {
    font-size: .58rem;
    letter-spacing: .03em;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    border-radius: 99px;
    padding: 2px 7px;
    border: 1px solid var(--color-border-tertiary)
  }

  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    gap: 12px;
    min-height: 300px
  }

  .state-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem
  }

  .state-sub {
    font-size: .8rem;
    color: var(--color-text-secondary);
    max-width: 24rem;
    line-height: 1.6
  }

  .pulse {
    animation: pulse 1.4s ease-in-out infinite;
    color: var(--color-text-secondary);
    font-size: 44px
  }

  @keyframes pulse {

    0%,
    100% {
      opacity: 1
    }

    50% {
      opacity: .2
    }
  }

  .retry {
    border: 1px solid var(--color-text-primary);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 6px
  }

  .load-more-wrap {
    text-align: center;
    padding: 20px
  }

  .load-more {
    border: 1px solid var(--color-text-primary);
    background: transparent;
    color: var(--color-text-primary);
    padding: 8px 24px;
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: .05em
  }

  .load-more:hover {
    background: var(--color-text-primary);
    color: var(--color-background-primary)
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, .55);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    min-height: 100%
  }

  .modal {
    background: var(--color-background-primary);
    border: 1px solid var(--color-border-primary);
    border-radius: 14px;
    width: min(560px, 100%);
    position: relative;
    animation: mIn .18s ease
  }

  @keyframes mIn {
    from {
      opacity: 0;
      transform: scale(.95) translateY(10px)
    }

    to {
      opacity: 1;
      transform: scale(1) translateY(0)
    }
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    border: 1px solid var(--color-border-secondary);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: .85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-primary);
    z-index: 2;
    line-height: 1
  }

  .modal-hero {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 13px 13px 0 0;
    background: var(--color-background-secondary);
    display: block
  }

  .modal-hero-fallback {
    width: 100%;
    height: 230px;
    border-radius: 13px 13px 0 0;
    background: var(--color-background-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--color-border-tertiary);
    font-size: 90px;
    color: var(--color-border-secondary)
  }

  .modal-body {
    padding: 18px 22px 22px
  }

  .modal-meta-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px
  }

  .modal-num {
    font-size: .65rem;
    letter-spacing: .06em;
    color: var(--color-text-secondary)
  }

  .modal-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    letter-spacing: -.03em;
    line-height: 1.15;
    margin-bottom: 10px
  }

  .modal-desc {
    font-size: .8rem;
    line-height: 1.75;
    color: var(--color-text-secondary);
    margin-bottom: 14px
  }

  .modal-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px
  }

  .modal-pill {
    font-size: .63rem;
    letter-spacing: .04em;
    border: 1px solid var(--color-border-primary);
    border-radius: 99px;
    padding: 3px 11px;
    background: transparent;
    color: var(--color-text-primary)
  }

  .modal-attrib {
    font-size: .6rem;
    color: var(--color-text-secondary);
    line-height: 1.6;
    padding-top: 10px;
    border-top: 1px solid var(--color-border-tertiary);
    margin-bottom: 16px
  }

  .modal-attrib a {
    color: var(--color-text-secondary)
  }

  .modal-nav {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    align-items: center
  }

  .modal-pos {
    font-size: .65rem;
    color: var(--color-text-secondary);
    letter-spacing: .04em
  }

  .nav-btns {
    display: flex;
    gap: 8px
  }

  .nav-btn {
    border: 1px solid var(--color-border-primary);
    background: transparent;
    color: var(--color-text-primary);
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .05em;
    cursor: pointer;
    border-radius: 4px;
    transition: background .12s, color .12s
  }

  .nav-btn:hover {
    background: var(--color-text-primary);
    color: var(--color-background-primary)
  }

  .nav-btn:disabled {
    opacity: .25;
    cursor: default
  }

  .empty {
    text-align: center;
    padding: 48px;
    color: var(--color-text-secondary);
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem
  }
</style>

<body>

  <nav class="navbar navbar-light bg-white sticky-top px-3 px-md-4 py-0">
    <a class="navbar-brand py-3 wordmark me-3">Dino<em>cyclopedia</em></a>
    <div class="d-flex align-items-center gap-3 ms-auto py-2">
      <span id="count" class="font-mono text-secondary d-none d-md-inline"
        style="font-size:.75rem; white-space:nowrap;"></span>
      <div class="input-group" style="max-width:320px;">
        <input id="search" type="text" class="form-control form-control-sm bg-white" placeholder="Search dinosaurs..."
          autocomplete="off" />
        <button class="btn btn-dark btn-sm btn-search">SEARCH</button>
      </div>
    </div>
  </nav>

  <main class="container-xl py-4 px-3 px-md-4" style="min-height:80vh;">

    <div id="state" class="d-flex flex-column align-items-center justify-content-center py-5 text-center"
      style="min-height:50vh;">
      <div class="state-icon mb-3">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#ccc">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <h2 class="font-display fs-3 mb-2">Loading Dinocyclopedia...</h2>
      <p class="text-muted" style="max-width:26rem; font-size:.9rem;">
        Fetching specimens from the Mesozoic archives.
      </p>
    </div>

    <div id="grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3" style="display:none;"></div>

    <div id="empty" class="text-center py-5" style="display:none;">
      <p class="font-display fs-2 text-secondary">No dinosaurs found.</p>
      <small class="text-muted">Try a different search term.</small>
    </div>

    <div class="app" id="app">
  <nav class="nav">
    <span class="wordmark">Dino<em>cyclopedia</em></span>
    <div class="nav-right">
      <span class="count" id="count"></span>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search dinosaurs..." autocomplete="off" />
        <button onclick="doSearch()">SEARCH</button>
      </div>
    </div>
  </nav>
  <div class="filter-row" id="filter-row" style="display:none">
    <span class="filter-label">DIET</span>
    <button class="filter-btn active" onclick="setDiet(this,'')">All</button>
    <button class="filter-btn" onclick="setDiet(this,'herbivore')">Herbivore</button>
    <button class="filter-btn" onclick="setDiet(this,'carnivore')">Carnivore</button>
    <button class="filter-btn" onclick="setDiet(this,'omnivore')">Omnivore</button>
  </div>
  <div id="state" class="state">
    <div class="pulse"><i class="ti ti-mood-smile" aria-hidden="true"></i></div>
    <p class="state-title">Loading Dinocyclopedia…</p>
    <p class="state-sub" id="state-sub">Waking up the archive — this may take 15–30 s on first load.</p>
  </div>
  <div id="grid" class="grid" style="display:none"></div>
  <div id="load-more-wrap" class="load-more-wrap" style="display:none">
    <button class="load-more" onclick="showMore()">LOAD MORE</button>
  </div>
  <div id="empty" class="empty" style="display:none">No dinosaurs found.</div>
</div>

<div id="overlay" class="overlay" style="display:none" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    <div id="modal-hero-wrap"></div>
    <div class="modal-body">
      <div class="modal-meta-row"><span class="modal-num" id="modal-num"></span></div>
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-pills" id="modal-pills"></div>
      <div class="modal-attrib" id="modal-attrib"></div>
      <div class="modal-nav">
        <span class="modal-pos" id="modal-pos"></span>
        <div class="nav-btns">
          <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← PREV</button>
          <button class="nav-btn" id="btn-next" onclick="navigate(1)">NEXT →</button>
        </div>
      </div>
    </div>
  </div>
</div>
  </main>

  <script>
  const BASE = 'https://restasaurus.onrender.com/api/v1';
  const PAGE_SIZE = 40;
  let allDinos = [], filtered = [], displayed = 0, currentIdx = 0, dietFilter = '';

  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function getField(d, ...keys) { for (const k of keys) { if (d[k] != null && d[k] !== '') return d[k]; } return ''; }

  function getImageUrl(d) {
    if (d.image && typeof d.image === 'object' && d.image.imageURL) return d.image.imageURL;
    if (d.imageURL) return d.imageURL;
    if (typeof d.image === 'string' && d.image.startsWith('http')) return d.image;
    return '';
  }

  function dietCode(d) {
    const l = (d || '').toLowerCase();
    if (l.includes('carnivore')) return 'C';
    if (l.includes('herbivore')) return 'H';
    if (l.includes('omnivore')) return 'O';
    return '';
  }

  function getClades(d) {
    const clades = [];
    for (let i = 1; i <= 5; i++) { const v = d['clade' + i] || d['clade_' + i]; if (v) clades.push(v); }
    if (d.clade && !clades.length) clades.push(d.clade);
    return clades;
  }

  async function fetchAllPages() {
    let page = 1, all = [], total = null;
    while (true) {
      const r = await fetch(`${BASE}/dinosaurs?page=${page}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (total === null) total = data.totalDinosaurs || data.total || data.count || null;
      const items = data.dinosaurs || data.data || data.results || [];
      if (!items.length) break;
      all = all.concat(items);
      document.getElementById('state-sub').textContent = `Loaded ${all.length}${total ? ' of ' + total : ''} specimens…`;
      const pageSize = items.length;
      if (pageSize < 10) break;
      page++;
    }
    return all;
  }

  async function init() {
    try {
      const dinos = await fetchAllPages();
      allDinos = dinos.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      document.getElementById('state').style.display = 'none';
      document.getElementById('filter-row').style.display = 'flex';
      filtered = allDinos;
      displayed = 0;
      renderGrid(true);
    } catch (err) {
      document.getElementById('state').innerHTML = `<p class="state-title">Failed to load</p><p class="state-sub">${esc(err.message)}</p><button class="retry" onclick="location.reload()">Try again</button>`;
    }
  }

  function renderGrid(reset) {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const lmw = document.getElementById('load-more-wrap');
    const count = document.getElementById('count');
    if (!filtered.length) {
      grid.style.display = 'none'; empty.style.display = ''; lmw.style.display = 'none';
      count.textContent = '0 results'; return;
    }
    empty.style.display = 'none'; grid.style.display = '';
    if (reset) { grid.innerHTML = ''; displayed = 0; }
    const slice = filtered.slice(displayed, displayed + PAGE_SIZE);
    const frag = document.createDocumentFragment();
    slice.forEach((d, i) => {
      const gi = allDinos.indexOf(d);
      const absI = filtered.indexOf(d);
      const dc = dietCode(getField(d, 'diet'));
      const temporal = getField(d, 'temporalrange', 'temporal_range', 'temporalRange');
      const loco = getField(d, 'locomotiontype', 'locomotion_type', 'locomotion');
      const imgUrl = getImageUrl(d);
      const col = document.createElement('div');
      col.innerHTML = `<div class="card" style="animation-delay:${Math.min(i * 20, 400)}ms" onclick="openModal(${gi})">
      <div class="card-img" id="cimg-${gi}">
        ${imgUrl ? `<img src="${esc(imgUrl)}" alt="${esc(d.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=fallback-icon><i class=\\'ti ti-dinosaur\\'></i></div>'">` : `<div class="fallback-icon"><i class="ti ti-dinosaur" aria-hidden="true"></i></div>`}
        <span class="card-num">${String(absI + 1).padStart(3, '0')}</span>
        ${dc ? `<span class="diet-badge diet-${dc}">${dc === 'C' ? 'Carn' : dc === 'H' ? 'Herb' : 'Omni'}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(d.name || 'Unknown')}</div>
        ${d.description ? `<div class="card-desc">${esc(d.description)}</div>` : ''}
        <div class="card-pills">
          ${temporal ? `<span class="pill">${esc(temporal)}</span>` : ''}
          ${loco ? `<span class="pill">${esc(loco)}</span>` : ''}
        </div>
      </div>
    </div>`;
      frag.appendChild(col);
    });
    grid.appendChild(frag);
    displayed += slice.length;
    count.textContent = filtered.length + ' specimen' + (filtered.length !== 1 ? 's' : '');
    lmw.style.display = displayed < filtered.length ? '' : 'none';
  }

  function showMore() { renderGrid(false); }

  function openModal(gi) {
    currentIdx = gi;
    showModal(gi);
    document.getElementById('overlay').style.display = 'flex';
  }

  function showModal(gi) {
    const d = allDinos[gi]; if (!d) return;
    currentIdx = gi;
    const pos = filtered.indexOf(d);
    document.getElementById('modal-num').textContent = String(pos + 1).padStart(3, '0') + ' / ' + String(filtered.length).padStart(3, '0');
    document.getElementById('modal-pos').textContent = String(gi + 1).padStart(3, '0') + ' of ' + String(allDinos.length).padStart(3, '0') + ' total';
    document.getElementById('modal-name').textContent = d.name || 'Unknown';
    document.getElementById('modal-desc').textContent = d.description || '';
    const imgUrl = getImageUrl(d);
    const heroWrap = document.getElementById('modal-hero-wrap');
    if (imgUrl) {
      heroWrap.innerHTML = `<img class="modal-hero" src="${esc(imgUrl)}" alt="${esc(d.name)}" onerror="this.outerHTML='<div class=modal-hero-fallback><i class=ti-dinosaur style=font-size:90px></i></div>'">`;
    } else {
      heroWrap.innerHTML = `<div class="modal-hero-fallback"><i class="ti ti-dinosaur" aria-hidden="true"></i></div>`;
    }
    const diet = getField(d, 'diet');
    const temporal = getField(d, 'temporalrange', 'temporal_range', 'temporalRange');
    const loco = getField(d, 'locomotiontype', 'locomotion_type', 'locomotion');
    const clades = getClades(d);
    const pills = [temporal, diet, loco, ...clades].filter(Boolean);
    document.getElementById('modal-pills').innerHTML = pills.map(p => `<span class="modal-pill">${esc(p)}</span>`).join('');
    let attrib = '';
    if (d.image && typeof d.image === 'object') {
      if (d.image.author) attrib += `Image: ${esc(d.image.author)}${d.image.license ? ' · ' + esc(d.image.license) : ''}. `;
    }
    const wikiUrl = d.source?.wikipediaURL || d.wikipediaURL;
    if (wikiUrl) attrib += `<a href="${esc(wikiUrl)}" target="_blank">Wikipedia source</a>`;
    document.getElementById('modal-attrib').innerHTML = attrib;
    const prevGi = findAdjacentInFiltered(gi, -1);
    const nextGi = findAdjacentInFiltered(gi, 1);
    document.getElementById('btn-prev').disabled = prevGi === -1;
    document.getElementById('btn-next').disabled = nextGi === -1;
    document.getElementById('modal').scrollTop = 0;
  }

  function findAdjacentInFiltered(gi, dir) {
    const pos = filtered.indexOf(allDinos[gi]);
    const nextPos = pos + dir;
    if (nextPos < 0 || nextPos >= filtered.length) return -1;
    return allDinos.indexOf(filtered[nextPos]);
  }

  function navigate(dir) { const nextGi = findAdjacentInFiltered(currentIdx, dir); if (nextGi !== -1) showModal(nextGi); }
  function closeModal() { document.getElementById('overlay').style.display = 'none'; }
  function handleOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  document.addEventListener('keydown', e => {
    if (document.getElementById('overlay').style.display !== 'none') {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    }
  });

  let searchTimer;
  document.getElementById('search').addEventListener('input', function () {
    clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 200);
  });
  document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function doSearch() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    applyFilters(q, dietFilter);
  }

  function setDiet(btn, diet) {
    dietFilter = diet;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    applyFilters(document.getElementById('search').value.trim().toLowerCase(), diet);
  }

  function applyFilters(q, diet) {
    filtered = allDinos.filter(d => {
      const temporal = getField(d, 'temporalrange', 'temporal_range', 'temporalRange');
      const loco = getField(d, 'locomotiontype', 'locomotion_type', 'locomotion');
      const clades = getClades(d).join(' ');
      const matchQ = !q || [d.name, d.description, d.diet, temporal, loco, clades].some(v => v && v.toLowerCase().includes(q));
      const matchD = !diet || (d.diet || '').toLowerCase().includes(diet);
      return matchQ && matchD;
    });
    renderGrid(true);
  }

  init();
</script>

</body>

</html>
