<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinocyclopedia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'DM Mono', monospace;
      background: #fff;
      color: #111;
    }

    .app {
      position: relative;
      min-height: 100vh;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
      gap: 12px;
      flex-wrap: wrap;
    }
    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      letter-spacing: -.02em;
      color: #111;
    }
    .wordmark em { font-style: italic }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .count { font-size: .68rem; color: #777; white-space: nowrap }
    .search-wrap { display: flex }
    .search-wrap input {
      border: 1px solid #ccc;
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 5px 10px;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      background: #fff;
      color: #111;
      outline: none;
      width: 170px;
    }
    .search-wrap button {
      border: 1px solid #111;
      border-radius: 0 4px 4px 0;
      padding: 5px 10px;
      background: #111;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .06em;
      cursor: pointer;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label { font-size: .65rem; color: #777; letter-spacing: .04em; margin-right: 2px }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: .04em;
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 99px;
      background: transparent;
      cursor: pointer;
      color: #777;
      transition: all .15s;
    }
    .filter-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 12px;
      padding: 16px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s;
      animation: rise .3s ease forwards;
      opacity: 0;
      transform: translateY(8px);
      background: #fff;
    }
    .card:hover { transform: translateY(-2px) }
    @keyframes rise { to { opacity: 1; transform: translateY(0) } }

    .card-img {
      height: 155px;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block }
    .fallback-icon { font-size: 52px; color: #ccc }
    .card-num {
      position: absolute;
      top: 6px; left: 6px;
      background: #111;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: .58rem;
      padding: 2px 5px;
      border-radius: 2px;
      z-index: 1;
    }
    .diet-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-family: 'DM Mono', monospace;
      font-size: .55rem;
      padding: 2px 6px;
      border-radius: 99px;
      z-index: 1;
      border: 1px solid;
    }
    .diet-C { background: #fff; border-color: #000; color: #000 }
    .diet-H { background: #000; border-color: #000; color: #fff }
    .diet-O { background: #888; border-color: #888; color: #fff }

    .card-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px }
    .card-name { font-family: 'DM Serif Display', serif; font-size: .95rem; letter-spacing: -.02em; line-height: 1.2 }
    .card-desc {
      font-size: .7rem;
      color: #777;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }
    .card-pills { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px }
    .pill {
      font-size: .58rem;
      letter-spacing: .03em;
      color: #777;
      background: #f5f5f5;
      border-radius: 99px;
      padding: 2px 7px;
      border: 1px solid #eee;
      /* Truncate long historical period values gracefully */
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
      min-height: 300px;
    }
    .state-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem }
    .state-sub { font-size: .8rem; color: #777; max-width: 24rem; line-height: 1.6 }
    .pulse { animation: pulse 1.4s ease-in-out infinite; color: #ccc; font-size: 44px }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .2 } }
    .retry {
      border: 1px solid #111;
      background: #111;
      color: #fff;
      padding: 6px 16px;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 6px;
    }

    .load-more-wrap { text-align: center; padding: 20px }
    .load-more {
      border: 1px solid #111;
      background: transparent;
      color: #111;
      padding: 8px 24px;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: .05em;
    }
    .load-more:hover { background: #111; color: #fff }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 1000;
      padding: 24px 16px;
      overflow-y: auto;
    }
    .modal {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      width: min(560px, 100%);
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      position: relative;
      animation: mIn .18s ease;
      margin: auto;
      flex-shrink: 0;
    }
    @keyframes mIn {
      from { opacity: 0; transform: scale(.95) translateY(10px) }
      to   { opacity: 1; transform: scale(1)  translateY(0) }
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: .85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      z-index: 2;
      line-height: 1;
    }
    .modal-hero {
      width: 100%;
      height: 230px;
      object-fit: cover;
      border-radius: 13px 13px 0 0;
      background: #f5f5f5;
      display: block;
    }
    .modal-hero-fallback {
      width: 100%;
      height: 230px;
      border-radius: 13px 13px 0 0;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #eee;
      font-size: 90px;
      color: #ccc;
    }
    .modal-body { padding: 18px 22px 22px }
    .modal-meta-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px }
    .modal-num { font-size: .65rem; letter-spacing: .06em; color: #777 }
    .modal-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      letter-spacing: -.03em;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .modal-desc { font-size: .8rem; line-height: 1.75; color: #555; margin-bottom: 14px }
    .modal-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px }
    .modal-pill {
      font-size: .63rem;
      letter-spacing: .04em;
      border: 1px solid #ccc;
      border-radius: 99px;
      padding: 3px 11px;
      background: transparent;
      color: #111;
    }
    .modal-attrib {
      font-size: .6rem;
      color: #999;
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid #eee;
      margin-bottom: 16px;
    }
    .modal-attrib a { color: #999 }
    .modal-nav { display: flex; gap: 8px; justify-content: space-between; align-items: center }
    .modal-pos { font-size: .65rem; color: #777; letter-spacing: .04em }
    .nav-btns { display: flex; gap: 8px }
    .nav-btn {
      border: 1px solid #ccc;
      background: transparent;
      color: #111;
      padding: 6px 16px;
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      letter-spacing: .05em;
      cursor: pointer;
      border-radius: 4px;
      transition: background .12s, color .12s;
    }
    .nav-btn:hover { background: #111; color: #fff }
    .nav-btn:disabled { opacity: .25; cursor: default }

    .empty {
      text-align: center;
      padding: 48px;
      color: #999;
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <nav class="nav">
    <span class="wordmark">Dino<em>cyclopedia</em></span>
    <div class="nav-right">
      <span class="count" id="count"></span>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search dinosaurs..." autocomplete="off"/>
        <button onclick="doSearch()">SEARCH</button>
      </div>
    </div>
  </nav>

  <div class="filter-row" id="filter-row" style="display:none">
    <span class="filter-label">DIET</span>
    <button class="filter-btn active" onclick="setDiet(this,'')">All</button>
    <button class="filter-btn" onclick="setDiet(this,'herbivorous')">Herbivore</button>
    <button class="filter-btn" onclick="setDiet(this,'carnivorous')">Carnivore</button>
    <button class="filter-btn" onclick="setDiet(this,'omnivorous')">Omnivore</button>
  </div>

  <div id="state" class="state">
    <div class="pulse"><i class="ti ti-mood-smile" aria-hidden="true"></i></div>
    <p class="state-title">Loading Dinocyclopedia…</p>
    <p class="state-sub" id="state-sub">Waking up the server — this may take 15–60 s on first load.</p>
  </div>

  <div id="grid" class="grid" style="display:none"></div>

  <div id="load-more-wrap" class="load-more-wrap" style="display:none">
    <button class="load-more" onclick="showMore()">LOAD MORE</button>
  </div>

  <div id="empty" class="empty" style="display:none">No dinosaurs found.</div>
</div>

<div id="overlay" class="overlay" style="display:none" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    <div id="modal-hero-wrap"></div>
    <div class="modal-body">
      <div class="modal-meta-row"><span class="modal-num" id="modal-num"></span></div>
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-pills" id="modal-pills"></div>
      <div class="modal-attrib" id="modal-attrib"></div>
      <div class="modal-nav">
        <span class="modal-pos" id="modal-pos"></span>
        <div class="nav-btns">
          <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← PREV</button>
          <button class="nav-btn" id="btn-next" onclick="navigate(1)">NEXT →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://dinoapi.onrender.com/dinos';
  const PAGE_SIZE = 40;
  let allDinos = [], filtered = [], displayed = 0, currentIdx = 0, dietFilter = '';

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Updated: image is a direct URL string in the new API schema
  function getImageUrl(d) {
    if (typeof d.image === 'string' && d.image.startsWith('http')) return d.image;
    return '';
  }

  // Updated: match "Herbivorous", "Carnivorous", "Omnivorous"
  function dietCode(diet) {
    const l = (diet || '').toLowerCase();
    if (l.includes('carnivorous')) return 'C';
    if (l.includes('herbivorous')) return 'H';
    if (l.includes('omnivorous'))  return 'O';
    return '';
  }

  // Truncate historical_period for the card pill (keep it concise)
  function truncatePeriod(period, maxLen = 28) {
    if (!period) return '';
    return period.length > maxLen ? period.slice(0, maxLen - 1) + '…' : period;
  }

  async function init() {
    try {
      document.getElementById('state-sub').textContent = 'Fetching all specimens…';
      const r = await fetch(API_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();

      // The API returns an array directly
      const dinos = Array.isArray(data) ? data : (data.dinos || data.data || data.results || []);
      allDinos = dinos.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

      document.getElementById('state').style.display = 'none';
      document.getElementById('filter-row').style.display = 'flex';
      filtered = allDinos;
      displayed = 0;
      renderGrid(true);
    } catch (err) {
      document.getElementById('state').innerHTML =
        `<p class="state-title">Failed to load</p>
         <p class="state-sub">${esc(err.message)}<br><br>The server may still be waking up. Please wait 30 seconds and try again.</p>
         <button class="retry" onclick="location.reload()">Try again</button>`;
    }
  }

  function renderGrid(reset) {
    const grid    = document.getElementById('grid');
    const empty   = document.getElementById('empty');
    const lmw     = document.getElementById('load-more-wrap');
    const count   = document.getElementById('count');

    if (!filtered.length) {
      grid.style.display = 'none';
      empty.style.display = '';
      lmw.style.display = 'none';
      count.textContent = '0 results';
      return;
    }

    empty.style.display = 'none';
    grid.style.display  = '';
    if (reset) { grid.innerHTML = ''; displayed = 0; }

    const slice = filtered.slice(displayed, displayed + PAGE_SIZE);
    const frag  = document.createDocumentFragment();

    slice.forEach((d, i) => {
      const gi     = allDinos.indexOf(d);
      const absI   = filtered.indexOf(d);
      const dc     = dietCode(d.diet);
      const period = d.historical_period || '';
      const imgUrl = getImageUrl(d);

      const col = document.createElement('div');
      col.innerHTML = `<div class="card" style="animation-delay:${Math.min(i*20,400)}ms" onclick="openModal(${gi})">
        <div class="card-img">
          ${imgUrl
            ? `<img src="${esc(imgUrl)}" alt="${esc(d.name)}" loading="lazy"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="fallback-icon" ${imgUrl ? 'style="display:none"' : ''}>
            <i class="ti ti-file-unknown" aria-hidden="true"></i>
          </div>
          <span class="card-num">${String(absI + 1).padStart(3, '0')}</span>
          ${dc ? `<span class="diet-badge diet-${dc}">${dc==='C'?'Carn':dc==='H'?'Herb':'Omni'}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${esc(d.name || 'Unknown')}</div>
          ${d.description ? `<div class="card-desc">${esc(d.description)}</div>` : ''}
          <div class="card-pills">
            ${period ? `<span class="pill" title="${esc(period)}">${esc(truncatePeriod(period))}</span>` : ''}
            ${dc     ? `<span class="pill">${esc(d.diet)}</span>` : ''}
          </div>
        </div>
      </div>`;
      frag.appendChild(col);
    });

    grid.appendChild(frag);
    displayed += slice.length;
    count.textContent = filtered.length + ' specimen' + (filtered.length !== 1 ? 's' : '');
    lmw.style.display = displayed < filtered.length ? '' : 'none';
  }

  function showMore() { renderGrid(false); }

  function openModal(gi) {
    currentIdx = gi;
    showModal(gi);
    document.getElementById('overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function showModal(gi) {
    const d = allDinos[gi];
    if (!d) return;
    currentIdx = gi;

    const pos = filtered.indexOf(d);
    document.getElementById('modal-num').textContent =
      String(pos + 1).padStart(3, '0') + ' / ' + String(filtered.length).padStart(3, '0');
    document.getElementById('modal-pos').textContent =
      String(gi + 1).padStart(3, '0') + ' of ' + String(allDinos.length).padStart(3, '0') + ' total';
    document.getElementById('modal-name').textContent = d.name || 'Unknown';
    document.getElementById('modal-desc').textContent = d.description || '';

    const imgUrl   = getImageUrl(d);
    const heroWrap = document.getElementById('modal-hero-wrap');
    if (imgUrl) {
      heroWrap.innerHTML = `<img class="modal-hero" src="${esc(imgUrl)}" alt="${esc(d.name)}"
        onerror="this.outerHTML='<div class=modal-hero-fallback><i class=\\'ti ti-file-unknown\\' style=\\'font-size:90px\\'></i></div>'">`;
    } else {
      heroWrap.innerHTML = `<div class="modal-hero-fallback">
        <i class="ti ti-file-unknown" style="font-size:90px" aria-hidden="true"></i></div>`;
    }

    // Build modal pills: historical_period + diet
    const pills = [d.historical_period, d.diet].filter(Boolean);
    document.getElementById('modal-pills').innerHTML =
      pills.map(p => `<span class="modal-pill">${esc(p)}</span>`).join('');

    document.getElementById('modal-attrib').innerHTML = '';

    document.getElementById('btn-prev').disabled = findAdjacentInFiltered(gi, -1) === -1;
    document.getElementById('btn-next').disabled = findAdjacentInFiltered(gi,  1) === -1;
    document.getElementById('modal').scrollTop = 0;
  }

  function findAdjacentInFiltered(gi, dir) {
    const pos  = filtered.indexOf(allDinos[gi]);
    const next = pos + dir;
    if (next < 0 || next >= filtered.length) return -1;
    return allDinos.indexOf(filtered[next]);
  }

  function navigate(dir) {
    const n = findAdjacentInFiltered(currentIdx, dir);
    if (n !== -1) showModal(n);
  }

  function closeModal() {
    document.getElementById('overlay').style.display = 'none';
    document.body.style.overflow = '';
  }
  function handleOverlay(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('overlay').style.display !== 'none') {
      if (e.key === 'Escape')      closeModal();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    }
  });

  let searchTimer;
  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(doSearch, 200);
  });
  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function doSearch() {
    applyFilters(document.getElementById('search').value.trim().toLowerCase(), dietFilter);
  }

  function setDiet(btn, diet) {
    dietFilter = diet;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    doSearch();
  }

  function applyFilters(q, diet) {
    filtered = allDinos.filter(d => {
      const matchQ = !q || [d.name, d.description, d.diet, d.historical_period]
        .some(v => v && v.toLowerCase().includes(q));
      // Diet filter: case-insensitive substring match on "herbivorous", "carnivorous", "omnivorous"
      const matchD = !diet || (d.diet || '').toLowerCase().includes(diet);
      return matchQ && matchD;
    });
    renderGrid(true);
  }

  init();
</script>
</body>
</html>
